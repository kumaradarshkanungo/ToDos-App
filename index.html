<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDos App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <span class="app-title">ToDos</span>
      <div class="month-nav">
        <button class="nav-btn" id="prevMonth" aria-label="Previous month">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="month-label" id="monthLabel"></span>
        <button class="nav-btn" id="nextMonth" aria-label="Next month">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </header>

    <!-- Main -->
    <main class="main">

      <!-- Progress -->
      <div class="progress-section" id="progressSection">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-text" id="progressText"></span>
      </div>

      <!-- List -->
      <div class="todo-list" id="todoList"></div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="10" y="8" width="44" height="50" rx="4"/>
          <line x1="20" y1="22" x2="44" y2="22"/>
          <line x1="20" y1="32" x2="44" y2="32"/>
          <line x1="20" y1="42" x2="34" y2="42"/>
          <polyline points="38 40 42 44 50 36"/>
        </svg>
        <p class="empty-title" id="emptyTitle">No todos for this month</p>
        <p class="empty-hint">Tap <strong>+</strong> to add one</p>
      </div>

    </main>

    <!-- FAB -->
    <button class="fab" id="addBtn" aria-label="Add todo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Add Todo Modal -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Add new todo">
      <div class="modal">
        <h2 class="modal-title">New Todo</h2>
        <form id="todoForm" novalidate>

          <div class="form-group">
            <label for="titleInput">Title *</label>
            <input type="text" id="titleInput" placeholder="What needs to be done?" autocomplete="off" />
            <span class="field-error" id="titleError">Title is required</span>
          </div>

          <div class="form-group">
            <label for="descInput">Description <span class="optional">(optional)</span></label>
            <textarea id="descInput" placeholder="Add details…" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label class="toggle-label" id="recurringLabel">
              <input type="checkbox" id="recurringInput" />
              <span class="toggle-switch"></span>
              <span class="toggle-text">
                <span class="toggle-title">Recurring monthly</span>
                <span class="toggle-desc">Appears in every month going forward</span>
              </span>
            </label>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="submitBtn" disabled>Add Todo</button>
          </div>

        </form>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
